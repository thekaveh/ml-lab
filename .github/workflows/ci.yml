name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly smoke of Tier-B/C papermill targets, surfaces env drift early.
    - cron: "0 7 * * 1"

jobs:
  pytest-nnx-surface:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            torch-requirements.txt
            nnx/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r torch-requirements.txt
          pip install -r requirements.txt
          pip install pytest

      - name: Verify nnx import
        run: python -c "import nnx; print(nnx.__file__)"

      - name: Run NNx-surface tests
        run: pytest tests/nnx_surface -v

  tier-a-papermill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            torch-requirements.txt
            nnx/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r torch-requirements.txt
          pip install -r requirements.txt

      - name: Verify nnx import
        run: python -c "import nnx; print(nnx.__file__)"

      - name: Run Tier-A notebooks (papermill)
        run: make run-tier-a

      - name: Upload refreshed notebook outputs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier-a-notebooks
          path: |
            image_classification-mnist-ffnn-numpy/notebook.ipynb
            image_classification-mnist-ffnn-pytorch/notebook.ipynb
            node_classification-reddit-gnn-pyg/phase1-dataset-exploration-notebook.ipynb
            tabular_classification-iris-mlp-pytorch/notebook.ipynb
          retention-days: 7

  smoke-tier-b:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch'
      || github.event_name == 'schedule'
      || contains(github.event.pull_request.labels.*.name, 'tier-b-smoke')
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            torch-requirements.txt
            nnx/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r torch-requirements.txt
          pip install -r requirements.txt

      - name: Smoke-run Tier-B notebooks
        run: make smoke-tier-b

  smoke-tier-c:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            torch-requirements.txt
            nnx/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r torch-requirements.txt
          pip install -r requirements.txt

      - name: Smoke-run Tier-C notebooks
        run: make smoke-tier-c
